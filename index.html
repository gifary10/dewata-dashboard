<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSE Monitoring System</title>
    
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0/dist/chartjs-plugin-datalabels.min.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Loading -->
    <div id="global-loading">
        <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;"></div>
        <p class="mt-3 fw-bold">Sinkronisasi Data...</p>
    </div>

    <!-- Welcome Screen -->
    <div id="welcome-screen" class="d-none">
        <div class="welcome-box">
            <div class="mb-4 text-primary">
                <i class="fa-solid fa-hospital-user fa-4x"></i>
            </div>
            <h2 class="fw-bold">Selamat Datang</h2>
            <p class="text-muted mb-4">Silakan pilih unit perusahaan untuk memulai sesi monitoring.</p>
            
            <div class="mb-3 text-start">
                <label class="form-label fw-semibold">Unit Perusahaan</label>
                <select id="welcome-company-select" class="form-select form-select-lg">
                    <option value="">Memuat list perusahaan...</option>
                </select>
            </div>
            
            <div class="mb-4 text-start">
                <label class="form-label fw-semibold">Password</label>
                <input type="password" id="welcome-password" class="form-control form-control-lg" placeholder="Masukkan password">
                <div id="password-error" class="text-danger small mt-2 d-none">
                    <i class="fa-solid fa-exclamation-circle me-1"></i>Password salah!
                </div>
            </div>
            
            <button class="btn btn-primary btn-lg w-100 fw-bold py-3" onclick="app.enterDashboard()">
                Masuk Dashboard <i class="fa-solid fa-chevron-right ms-2"></i>
            </button>
        </div>
    </div>

    <!-- Main Content -->
    <div id="main-dashboard" class="d-none">
        <nav class="navbar navbar-custom sticky-top">
            <div class="container-fluid">
                <span class="navbar-brand d-flex align-items-center">
                    <i class="fa-solid fa-notes-medical text-primary me-2"></i>
                    IHC Dewata
                </span>
                
                <div class="company-badge ms-2 me-3">
                    <i class="fa-solid fa-building"></i>
                    <span id="active-company-name">-</span>
                </div>
                
                <!-- FILTERS IN NAVBAR -->
                <div class="navbar-filters">
                    <div class="filter-item">
                        <input type="text" id="filter-nama" class="form-control" placeholder="Cari Nama">
                    </div>
                    <div class="filter-item">
                        <select id="filter-dept" class="form-select">
                            <option value="">Semua Dept</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <select id="filter-bulan" class="form-select">
                            <option value="">Semua Bulan</option>
                            <option value="1">Januari</option><option value="2">Februari</option>
                            <option value="3">Maret</option><option value="4">April</option>
                            <option value="5">Mei</option><option value="6">Juni</option>
                            <option value="7">Juli</option><option value="8">Agustus</option>
                            <option value="9">September</option><option value="10">Oktober</option>
                            <option value="11">November</option><option value="12">Desember</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <select id="filter-tahun" class="form-select">
                            <option value="">Semua Tahun</option>
                        </select>
                    </div>
                    <button class="btn-reset-filter" onclick="app.resetFilters()">
                        <i class="fa-solid fa-eraser me-1"></i> Reset
                    </button>
                </div>
                
                <div class="d-flex gap-2">
                    <button class="btn-change-unit" onclick="app.changeCompany()">
                        <i class="fa-solid fa-building-circle-arrow-right"></i> Ganti Unit
                    </button>
                    <button class="btn-sync-nav" onclick="app.fetchData()">
                        <i class="fa-solid fa-rotate"></i> Sync
                    </button>
                </div>
            </div>
        </nav>

        <div class="container-fluid py-4 px-lg-5">
            
            <!-- Tab Navigation -->
            <ul class="nav nav-pills mb-4" id="pills-tab" role="tablist">
                <li class="nav-item">
                    <button class="nav-link active" id="tab-berobat" data-bs-toggle="tab" data-bs-target="#panel-berobat" type="button" onclick="app.setTab('Berobat')">
                        <i class="fa-solid fa-suitcase-medical me-2"></i>Berobat
                    </button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" id="tab-kecelakaan" data-bs-toggle="tab" data-bs-target="#panel-kecelakaan" type="button" onclick="app.setTab('Kecelakaan')">
                        <i class="fa-solid fa-truck-medical me-2"></i>Kecelakaan
                    </button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" id="tab-konsultasi" data-bs-toggle="tab" data-bs-target="#panel-konsultasi" type="button" onclick="app.setTab('Konsultasi')">
                        <i class="fa-solid fa-user-doctor me-2"></i>Konsultasi
                    </button>
                </li>
            </ul>

            <!-- Tab Content -->
            <div class="tab-content" id="pills-tabContent">
                <div class="tab-pane fade show active" id="panel-berobat" role="tabpanel"></div>
                <div class="tab-pane fade" id="panel-kecelakaan" role="tabpanel"></div>
                <div class="tab-pane fade" id="panel-konsultasi" role="tabpanel"></div>
            </div>
        </div>
    </div>

    <!-- Modal Image -->
    <div class="modal fade" id="imgModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content border-0">
                <div class="modal-body p-0 text-center">
                    <img id="img-preview" src="" class="img-fluid rounded">
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/charts.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
